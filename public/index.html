<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Infinix 产品线看板系统</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #FF6B00;
      --primary-dark: #E55A00;
      --bg-dark: #1a1a2e;
      --bg-card: #16213e;
      --bg-hover: #1f3460;
      --text-primary: #ffffff;
      --text-secondary: #a0a0a0;
      --accent: #00D4AA;
      --danger: #ff4757;
      --success: #2ed573;
      --warning: #ffa502;
      --gt: #FF6B00;
      --note: #00D4AA;
      --hot: #FF4757;
      --smt: #7B68EE;
    }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg-dark); color: var(--text-primary); min-height: 100vh; }
    header { background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%); padding: 20px 40px; border-bottom: 2px solid var(--primary); position: sticky; top: 0; z-index: 100; }
    header h1 { font-size: 28px; font-weight: 700; color: var(--primary); display: flex; align-items: center; gap: 12px; }
    header h1 span { font-size: 14px; color: var(--text-secondary); font-weight: 400; }
    .header-stats { display: flex; gap: 30px; margin-top: 15px; }
    .stat-item { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-secondary); }
    .stat-item strong { color: var(--accent); font-size: 18px; }
    .filter-bar { background: var(--bg-card); padding: 20px 40px; display: flex; gap: 15px; flex-wrap: wrap; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .filter-group { display: flex; align-items: center; gap: 8px; }
    .filter-group label { font-size: 13px; color: var(--text-secondary); }
    select, input { background: var(--bg-dark); border: 1px solid rgba(255,255,255,0.2); color: var(--text-primary); padding: 8px 12px; border-radius: 6px; font-size: 13px; min-width: 120px; }
    select:focus, input:focus { outline: none; border-color: var(--primary); }
    .btn { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 600; transition: all 0.3s; }
    .btn:hover { background: var(--primary-dark); transform: translateY(-2px); }
    .btn-secondary { background: transparent; border: 1px solid var(--primary); color: var(--primary); }
    .btn-secondary:hover { background: var(--primary); color: white; }
    .btn-danger { background: var(--danger); }
    .btn-small { padding: 6px 12px; font-size: 12px; }
    .main-content { padding: 30px 40px; }
    .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 25px; }
    .product-card { background: var(--bg-card); border-radius: 16px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); transition: all 0.3s; position: relative; }
    .product-card:hover { transform: translateY(-5px); box-shadow: 0 20px 40px rgba(0,0,0,0.3); border-color: var(--primary); }
    .card-header { padding: 20px; display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .line-badge { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; text-transform: uppercase; }
    .line-GT { background: var(--gt); color: white; }
    .line-NOTE { background: var(--note); color: white; }
    .line-HOT { background: var(--hot); color: white; }
    .line-SMT { background: var(--smt); color: white; }
    .stage-badge { padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; background: rgba(255,255,255,0.1); color: var(--text-secondary); }
    .stage-badge.已上市 { background: var(--success); color: white; }
    .stage-badge.研发中 { background: var(--warning); color: white; }
    .stage-badge.设计中 { background: var(--accent); color: white; }
    .stage-badge.概念阶段 { background: var(--smt); color: white; }
    .card-body { padding: 20px; }
    .product-name { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    .product-meta { display: flex; gap: 15px; color: var(--text-secondary); font-size: 13px; margin-bottom: 15px; }
    .product-meta span { display: flex; align-items: center; gap: 4px; }
    .specs-tag { background: rgba(255,107,0,0.2); color: var(--primary); padding: 6px 12px; border-radius: 8px; font-size: 12px; display: inline-block; margin-bottom: 15px; }
    .feedback-section { margin-top: 15px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); }
    .feedback-item { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 10px; }
    .feedback-icon { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; }
    .feedback-icon.positive { background: rgba(46,213,115,0.2); color: var(--success); }
    .feedback-icon.negative { background: rgba(255,71,87,0.2); color: var(--danger); }
    .feedback-text { font-size: 13px; color: var(--text-secondary); }
    .cmf-section { margin-top: 15px; }
    .cmf-label { font-size: 11px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
    .cmf-text { font-size: 13px; color: var(--text-primary); line-height: 1.5; }
    .problem-section { background: rgba(255,71,87,0.1); padding: 12px; border-radius: 8px; margin-top: 12px; }
    .problem-label { font-size: 11px; color: var(--danger); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
    .problem-text { font-size: 12px; color: var(--text-secondary); }
    .suggestion-section { background: rgba(0,212,170,0.1); padding: 12px; border-radius: 8px; margin-top: 12px; }
    .suggestion-label { font-size: 11px; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
    .suggestion-text { font-size: 12px; color: var(--text-secondary); }
    .card-footer { padding: 15px 20px; background: rgba(0,0,0,0.2); display: flex; gap: 10px; justify-content: flex-end; }
    .image-gallery { display: flex; gap: 8px; margin-top: 15px; overflow-x: auto; padding-bottom: 5px; }
    .image-thumb { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; cursor: pointer; border: 2px solid transparent; transition: all 0.2s; flex-shrink: 0; }
    .image-thumb:hover { border-color: var(--primary); transform: scale(1.1); }
    .image-thumb.active { border-color: var(--accent); }
    .color-swatches { display: flex; gap: 6px; margin-top: 12px; }
    .color-swatch { width: 28px; height: 28px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.3); cursor: pointer; transition: all 0.2s; }
    .color-swatch:hover { transform: scale(1.2); border-color: white; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; padding: 20px; }
    .modal.active { display: flex; }
    .modal-content { background: var(--bg-card); border-radius: 16px; width: 100%; max-width: 800px; max-height: 90vh; overflow-y: auto; }
    .modal-header { padding: 20px 25px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center; }
    .modal-title { font-size: 20px; font-weight: 700; }
    .modal-close { background: none; border: none; color: var(--text-secondary); font-size: 28px; cursor: pointer; line-height: 1; }
    .modal-close:hover { color: var(--danger); }
    .modal-body { padding: 25px; }
    .form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full { grid-column: span 2; }
    .form-group label { font-size: 13px; color: var(--text-secondary); font-weight: 500; }
    .form-group input, .form-group select, .form-group textarea { background: var(--bg-dark); border: 1px solid rgba(255,255,255,0.2); color: var(--text-primary); padding: 10px 12px; border-radius: 6px; font-size: 13px; }
    .form-group textarea { min-height: 80px; resize: vertical; }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--primary); }
    .modal-footer { padding: 20px 25px; border-top: 1px solid rgba(255,255,255,0.1); display: flex; gap: 10px; justify-content: flex-end; }
    .image-upload-area { border: 2px dashed rgba(255,255,255,0.2); border-radius: 12px; padding: 30px; text-align: center; cursor: pointer; transition: all 0.3s; }
    .image-upload-area:hover { border-color: var(--primary); background: rgba(255,107,0,0.05); }
    .image-upload-area p { color: var(--text-secondary); font-size: 14px; margin-top: 10px; }
    .uploaded-images { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 15px; }
    .uploaded-image-item { position: relative; width: 100px; }
    .uploaded-image-item img { width: 100px; height: 100px; object-fit: cover; border-radius: 8px; }
    .uploaded-image-item .remove-btn { position: absolute; top: -8px; right: -8px; width: 24px; height: 24px; background: var(--danger); border: none; border-radius: 50%; color: white; cursor: pointer; font-size: 14px; line-height: 24px; }
    .image-type-select { display: flex; gap: 20px; margin-top: 15px; }
    .image-type-option { display: flex; align-items: center; gap: 6px; cursor: pointer; }
    .image-type-option input { width: auto; }
    .toast { position: fixed; bottom: 30px; right: 30px; background: var(--bg-card); color: white; padding: 15px 25px; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); z-index: 2000; transform: translateY(100px); opacity: 0; transition: all 0.3s; }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { border-left: 4px solid var(--success); }
    .toast.error { border-left: 4px solid var(--danger); }
    .image-viewer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; display: none; justify-content: center; align-items: center; }
    .image-viewer.active { display: flex; }
    .image-viewer img { max-width: 90%; max-height: 90%; object-fit: contain; }
    .image-viewer .close-btn { position: absolute; top: 20px; right: 20px; background: none; border: none; color: white; font-size: 36px; cursor: pointer; }
    .image-viewer .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.2); border: none; color: white; width: 50px; height: 50px; border-radius: 50%; font-size: 24px; cursor: pointer; transition: all 0.3s; }
    .image-viewer .nav-btn:hover { background: var(--primary); }
    .image-viewer .prev-btn { left: 20px; }
    .image-viewer .next-btn { right: 20px; }
    .image-viewer .type-label { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--primary); padding: 8px 20px; border-radius: 20px; font-size: 14px; }
    .empty-state { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
    .empty-state h3 { font-size: 20px; margin-bottom: 10px; color: var(--text-primary); }
    .loading { display: flex; justify-content: center; align-items: center; padding: 60px; }
    .spinner { width: 40px; height: 40px; border: 3px solid rgba(255,107,0,0.3); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .confirm-modal { text-align: center; padding: 30px; }
    .confirm-modal p { margin-bottom: 25px; font-size: 16px; }
    .confirm-modal .btn-group { display: flex; gap: 15px; justify-content: center; }
  </style>
</head>
<body>
  <header>
    <h1>📱 Infinix 产品线看板 <span>多人实时协作 · 数据共享</span></h1>
    <div class="header-stats">
      <div class="stat-item">总产品数: <strong id="statTotal">0</strong></div>
      <div class="stat-item">GT: <strong id="statGT">0</strong></div>
      <div class="stat-item">NOTE: <strong id="statNOTE">0</strong></div>
      <div class="stat-item">HOT: <strong id="statHOT">0</strong></div>
      <div class="stat-item">SMT: <strong id="statSMT">0</strong></div>
    </div>
  </header>

  <div class="filter-bar">
    <button class="btn" onclick="openAddModal()">+ 添加产品</button>
    <div class="filter-group">
      <label>产品线:</label>
      <select id="filterLine"><option value="">全部</option><option value="GT">GT</option><option value="NOTE">NOTE</option><option value="HOT">HOT</option><option value="SMT">SMT</option></select>
    </div>
    <div class="filter-group">
      <label>年份:</label>
      <select id="filterYear"><option value="">全部</option><option value="2024">2024</option><option value="2025">2025</option></select>
    </div>
    <div class="filter-group">
      <label>阶段:</label>
      <select id="filterStage"><option value="">全部</option><option value="已上市">已上市</option><option value="研发中">研发中</option><option value="设计中">设计中</option><option value="概念阶段">概念阶段</option></select>
    </div>
    <div class="filter-group">
      <label>配色:</label>
      <input type="text" id="filterColor" placeholder="搜索配色..." style="min-width: 150px;">
    </div>
    <button class="btn btn-secondary" onclick="loadProducts()">应用筛选</button>
    <button class="btn btn-secondary" onclick="clearFilters()">清除筛选</button>
  </div>

  <div class="main-content">
    <div id="loading" class="loading"><div class="spinner"></div></div>
    <div id="productsGrid" class="products-grid"></div>
    <div id="emptyState" class="empty-state" style="display:none;">
      <h3>暂无产品</h3>
      <p>点击"添加产品"创建第一个产品记录</p>
    </div>
  </div>

  <div id="productModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 class="modal-title" id="modalTitle">添加产品</h2>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div class="modal-body">
        <form id="productForm">
          <input type="hidden" id="productId">
          <div class="form-grid">
            <div class="form-group">
              <label>产品线 *</label>
              <select id="productLine" required></select>
            </div>
            <div class="form-group">
              <label>产品名称 *</label>
              <input type="text" id="productName" required placeholder="如: GT 15 Pro">
            </div>
            <div class="form-group">
              <label>年份</label>
              <select id="productYear"><option value="2024">2024</option><option value="2025">2025</option><option value="2026">2026</option></select>
            </div>
            <div class="form-group">
              <label>产品阶段</label>
              <select id="productStage"><option value="已上市">已上市</option><option value="研发中">研发中</option><option value="设计中">设计中</option><option value="概念阶段">概念阶段</option></select>
            </div>
            <div class="form-group full">
              <label>产品配置</label>
              <input type="text" id="productSpecs" placeholder="如: 骁龙8 Gen3, 12GB+256GB">
            </div>
            <div class="form-group full">
              <label>价格区间</label>
              <input type="text" id="productPrice" placeholder="如: ¥2,999-3,499">
            </div>
            <div class="form-group full">
              <label>CMF工艺特点</label>
              <textarea id="productCmf" placeholder="描述材质、颜色、工艺等"></textarea>
            </div>
            <div class="form-group">
              <label>市场反馈</label>
              <textarea id="productFeedback" placeholder="用户评价、市场表现"></textarea>
            </div>
            <div class="form-group">
              <label>反馈类型</label>
              <select id="feedbackType"><option value="">请选择</option><option value="positive">正向</option><option value="negative">负面</option></select>
            </div>
            <div class="form-group full">
              <label>问题复盘</label>
              <textarea id="problemReview" placeholder="已发现的问题和改进点"></textarea>
            </div>
            <div class="form-group full">
              <label>下一代设计建议</label>
              <textarea id="nextSuggestion" placeholder="对下一代产品的建议"></textarea>
            </div>
          </div>

          <div style="margin-top: 25px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 25px;">
            <h4 style="margin-bottom: 15px; color: var(--primary);">📷 产品图片</h4>
            <div class="image-type-select">
              <label class="image-type-option"><input type="radio" name="uploadImageType" value="3D图" checked> 3D图</label>
              <label class="image-type-option"><input type="radio" name="uploadImageType" value="六视图"> 六视图</label>
              <label class="image-type-option"><input type="radio" name="uploadImageType" value="配色图"> 配色图</label>
              <label class="image-type-option"><input type="radio" name="uploadImageType" value="CMF工艺图"> CMF工艺图</label>
            </div>
            <div class="image-upload-area" onclick="document.getElementById('imageInput').click()">
              <input type="file" id="imageInput" accept="image/*" multiple style="display:none;" onchange="handleImageUpload(event)">
              <p>点击上传图片 或 拖拽图片到这里</p>
              <p style="font-size:12px;color:var(--text-secondary);">支持 PNG, JPG, WEBP</p>
            </div>
            <div id="uploadedImages" class="uploaded-images"></div>
          </div>

          <div style="margin-top: 25px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 25px;">
            <h4 style="margin-bottom: 15px; color: var(--primary);">🎨 产品配色</h4>
            <div style="display:flex;gap:10px;margin-bottom:15px;">
              <input type="text" id="colorName" placeholder="颜色名称" style="flex:1;">
              <input type="color" id="colorCode" value="#000000" style="width:50px;padding:0;border:none;">
              <button type="button" class="btn btn-small" onclick="addColor()">添加配色</button>
            </div>
            <div id="colorList" class="color-swatches"></div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" onclick="closeModal()">取消</button>
        <button type="button" class="btn" onclick="saveProduct()">保存</button>
      </div>
    </div>
  </div>

  <div id="deleteModal" class="modal">
    <div class="modal-content" style="max-width: 400px;">
      <div class="confirm-modal">
        <h3 style="color: var(--danger); margin-bottom: 15px;">确认删除</h3>
        <p>确定要删除 "<span id="deleteProductName"></span>" 吗？<br>此操作不可撤销。</p>
        <div class="btn-group">
          <button class="btn btn-secondary" onclick="closeDeleteModal()">取消</button>
          <button class="btn btn-danger" onclick="confirmDelete()">确认删除</button>
        </div>
      </div>
    </div>
  </div>

  <div id="imageViewer" class="image-viewer">
    <button class="close-btn" onclick="closeImageViewer()">&times;</button>
    <button class="nav-btn prev-btn" onclick="prevImage()">&#10094;</button>
    <img id="viewerImage" src="" alt="">
    <button class="nav-btn next-btn" onclick="nextImage()">&#10095;</button>
    <div class="type-label" id="viewerTypeLabel"></div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    const API = window.location.origin + '/api';
    let products = [];
    let productLines = [];
    let editingImages = [];
    let editingColors = [];
    let currentViewIndex = 0;
    let viewImages = [];
    let deleteProductId = null;

    async function init() {
      await loadProductLines();
      await loadProducts();
      await loadStats();
    }

    async function loadProductLines() {
      try {
        const res = await fetch(API + '/lines');
        productLines = await res.json();
        const select = document.getElementById('productLine');
        select.innerHTML = productLines.map(l => `<option value="${l.id}">${l.name} - ${l.description}</option>`).join('');
      } catch (err) { showToast('加载产品线失败', 'error'); }
    }

    async function loadProducts() {
      document.getElementById('loading').style.display = 'flex';
      document.getElementById('productsGrid').innerHTML = '';
      document.getElementById('emptyState').style.display = 'none';

      const line = document.getElementById('filterLine').value;
      const year = document.getElementById('filterYear').value;
      const stage = document.getElementById('filterStage').value;
      const color = document.getElementById('filterColor').value;

      let url = API + '/products?';
      if (line) url += 'line=' + line + '&';
      if (year) url += 'year=' + year + '&';
      if (stage) url += 'stage=' + stage + '&';
      if (color) url += 'color=' + encodeURIComponent(color) + '&';

      try {
        const res = await fetch(url);
        products = await res.json();
        renderProducts();
      } catch (err) {
        showToast('加载产品失败', 'error');
      } finally {
        document.getElementById('loading').style.display = 'none';
      }
    }

    async function loadStats() {
      try {
        const res = await fetch(API + '/stats');
        const stats = await res.json();
        document.getElementById('statTotal').textContent = stats.total;
        stats.byLine.forEach(s => {
          const el = document.getElementById('stat' + s.name);
          if (el) el.textContent = s.count;
        });
      } catch (err) { console.error('加载统计失败', err); }
    }

    function renderProducts() {
      const grid = document.getElementById('productsGrid');
      if (products.length === 0) {
        grid.innerHTML = '';
        document.getElementById('emptyState').style.display = 'block';
        return;
      }
      document.getElementById('emptyState').style.display = 'none';

      grid.innerHTML = products.map(p => {
        const allImages = p.images || [];
        const thumbs = allImages.slice(0, 4).map((img, i) => `<img src="${img.image_data}" class="image-thumb" onclick="openImageViewer(${i}, ${p.id})" alt="${img.image_type}">`).join('');
        const colors = p.colors || [];
        const colorSwatches = colors.map(c => `<div class="color-swatch" style="background:${c.color_code}" title="${c.color_name}"></div>`).join('');

        return `
          <div class="product-card">
            <div class="card-header">
              <span class="line-badge line-${p.line_name}">${p.line_name}</span>
              <span class="stage-badge ${p.stage}">${p.stage}</span>
            </div>
            <div class="card-body">
              <h3 class="product-name">${p.name}</h3>
              <div class="product-meta">
                <span>📅 ${p.year}</span>
                <span>💰 ${p.price_range || '待定'}</span>
              </div>
              ${p.specs ? `<div class="specs-tag">⚙️ ${p.specs}</div>` : ''}
              ${thumbs ? `<div class="image-gallery">${thumbs}</div>` : ''}
              ${colorSwatches ? `<div class="color-swatches">${colorSwatches}</div>` : ''}
              ${p.market_feedback ? `
                <div class="feedback-section">
                  <div class="feedback-item">
                    <div class="feedback-icon ${p.feedback_type}">${p.feedback_type === 'positive' ? '👍' : '👎'}</div>
                    <div class="feedback-text">${p.market_feedback}</div>
                  </div>
                </div>
              ` : ''}
              ${p.cmf_summary ? `
                <div class="cmf-section">
                  <div class="cmf-label">CMF 工艺特点</div>
                  <div class="cmf-text">${p.cmf_summary}</div>
                </div>
              ` : ''}
              ${p.problem_review ? `
                <div class="problem-section">
                  <div class="problem-label">⚠️ 问题复盘</div>
                  <div class="problem-text">${p.problem_review}</div>
                </div>
              ` : ''}
              ${p.next_gen_suggestion ? `
                <div class="suggestion-section">
                  <div class="suggestion-label">💡 下一代建议</div>
                  <div class="suggestion-text">${p.next_gen_suggestion}</div>
                </div>
              ` : ''}
            </div>
            <div class="card-footer">
              <button class="btn btn-secondary btn-small" onclick="editProduct(${p.id})">编辑</button>
              <button class="btn btn-danger btn-small" onclick="openDeleteModal(${p.id}, '${p.name.replace(/'/g, "\\'")}')">删除</button>
            </div>
          </div>
        `;
      }).join('');
    }

    function openAddModal() {
      document.getElementById('modalTitle').textContent = '添加产品';
      document.getElementById('productForm').reset();
      document.getElementById('productId').value = '';
      document.getElementById('productYear').value = new Date().getFullYear();
      editingImages = [];
      editingColors = [];
      renderUploadedImages();
      renderColorList();
      document.getElementById('productModal').classList.add('active');
    }

    async function editProduct(id) {
      try {
        const res = await fetch(API + '/products/' + id);
        const p = await res.json();
        document.getElementById('modalTitle').textContent = '编辑产品';
        document.getElementById('productId').value = p.id;
        document.getElementById('productLine').value = p.product_line_id;
        document.getElementById('productName').value = p.name;
        document.getElementById('productYear').value = p.year || new Date().getFullYear();
        document.getElementById('productStage').value = p.stage || '设计中';
        document.getElementById('productSpecs').value = p.specs || '';
        document.getElementById('productPrice').value = p.price_range || '';
        document.getElementById('productCmf').value = p.cmf_summary || '';
        document.getElementById('productFeedback').value = p.market_feedback || '';
        document.getElementById('feedbackType').value = p.feedback_type || '';
        document.getElementById('problemReview').value = p.problem_review || '';
        document.getElementById('nextSuggestion').value = p.next_gen_suggestion || '';
        editingImages = p.images || [];
        editingColors = p.colors || [];
        renderUploadedImages();
        renderColorList();
        document.getElementById('productModal').classList.add('active');
      } catch (err) { showToast('加载产品详情失败', 'error'); }
    }

    function closeModal() {
      document.getElementById('productModal').classList.remove('active');
    }

    async function saveProduct() {
      const id = document.getElementById('productId').value;
      const data = {
        product_line_id: document.getElementById('productLine').value,
        name: document.getElementById('productName').value,
        year: document.getElementById('productYear').value,
        stage: document.getElementById('productStage').value,
        specs: document.getElementById('productSpecs').value,
        price_range: document.getElementById('productPrice').value,
        cmf_summary: document.getElementById('productCmf').value,
        market_feedback: document.getElementById('productFeedback').value,
        feedback_type: document.getElementById('feedbackType').value,
        problem_review: document.getElementById('problemReview').value,
        next_gen_suggestion: document.getElementById('nextSuggestion').value,
        images: editingImages,
        colors: editingColors
      };

      if (!data.name || !data.product_line_id) { showToast('请填写必填项', 'error'); return; }

      try {
        const url = id ? API + '/products/' + id : API + '/products';
        const method = id ? 'PUT' : 'POST';
        const res = await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
        if (res.ok) {
          showToast(id ? '产品已更新' : '产品已添加', 'success');
          closeModal();
          loadProducts();
          loadStats();
        } else { showToast('保存失败', 'error'); }
      } catch (err) { showToast('保存失败: ' + err.message, 'error'); }
    }

    function handleImageUpload(event) {
      const files = event.target.files;
      const type = document.querySelector('input[name="uploadImageType"]:checked').value;
      Array.from(files).forEach(file => {
        const reader = new FileReader();
        reader.onload = e => { editingImages.push({ image_type: type, image_data: e.target.result, description: '' }); renderUploadedImages(); };
        reader.readAsDataURL(file);
      });
      event.target.value = '';
    }

    function renderUploadedImages() {
      const container = document.getElementById('uploadedImages');
      container.innerHTML = editingImages.map((img, i) => `
        <div class="uploaded-image-item">
          <img src="${img.image_data}" alt="${img.image_type}">
          <button class="remove-btn" onclick="removeImage(${i})">&times;</button>
          <div style="font-size:10px;text-align:center;margin-top:4px;">${img.image_type}</div>
        </div>
      `).join('');
    }

    function removeImage(index) { editingImages.splice(index, 1); renderUploadedImages(); }

    function addColor() {
      const name = document.getElementById('colorName').value.trim();
      const code = document.getElementById('colorCode').value;
      if (!name) { showToast('请输入颜色名称', 'error'); return; }
      editingColors.push({ color_name: name, color_code: code });
      document.getElementById('colorName').value = '';
      renderColorList();
    }

    function renderColorList() {
      const container = document.getElementById('colorList');
      container.innerHTML = editingColors.map((c, i) => `<div class="color-swatch" style="background:${c.color_code}" title="${c.color_name}" onclick="removeColor(${i})"></div>`).join('');
    }

    function removeColor(index) { editingColors.splice(index, 1); renderColorList(); }

    function openImageViewer(index, productId) {
      const product = products.find(p => p.id === productId);
      if (!product || !product.images || product.images.length === 0) return;
      viewImages = product.images;
      currentViewIndex = index;
      showCurrentImage();
      document.getElementById('imageViewer').classList.add('active');
    }

    function showCurrentImage() {
      const img = viewImages[currentViewIndex];
      document.getElementById('viewerImage').src = img.image_data;
      document.getElementById('viewerTypeLabel').textContent = img.image_type + ' (' + (currentViewIndex + 1) + '/' + viewImages.length + ')';
    }

    function prevImage() { currentViewIndex = (currentViewIndex - 1 + viewImages.length) % viewImages.length; showCurrentImage(); }
    function nextImage() { currentViewIndex = (currentViewIndex + 1) % viewImages.length; showCurrentImage(); }
    function closeImageViewer() { document.getElementById('imageViewer').classList.remove('active'); }

    function openDeleteModal(id, name) { deleteProductId = id; document.getElementById('deleteProductName').textContent = name; document.getElementById('deleteModal').classList.add('active'); }
    function closeDeleteModal() { document.getElementById('deleteModal').classList.remove('active'); deleteProductId = null; }

    async function confirmDelete() {
      if (!deleteProductId) return;
      try {
        const res = await fetch(API + '/products/' + deleteProductId, { method: 'DELETE' });
        if (res.ok) { showToast('产品已删除', 'success'); closeDeleteModal(); loadProducts(); loadStats(); }
        else { showToast('删除失败', 'error'); }
      } catch (err) { showToast('删除失败', 'error'); }
    }

    function clearFilters() { document.getElementById('filterLine').value = ''; document.getElementById('filterYear').value = ''; document.getElementById('filterStage').value = ''; document.getElementById('filterColor').value = ''; loadProducts(); }

    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = 'toast ' + type + ' show';
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeModal(); closeDeleteModal(); closeImageViewer(); } });
    document.getElementById('imageViewer').addEventListener('click', e => { if (e.target.id === 'imageViewer') closeImageViewer(); });

    init();
  </script>
</body>
</html>
